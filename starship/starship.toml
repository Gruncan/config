# =============================================================================
# Starship — Tokyo Night Dark prompt
# Deploy: cp starship/starship.toml ~/.config/starship.toml
# Note: starship also ships a built-in preset you can preview first:
#   starship preset tokyo-night -o /tmp/starship-preview.toml
# =============================================================================

# Format — one line (Omarchy-style): cwd + git + duration, then prompt char (no line_break).
# See https://github.com/basecamp/omarchy/blob/dev/config/starship.toml
format = """$directory${custom.githead}$git_status$git_state$cmd_duration$character"""

# Right prompt (optional — shows context without cluttering the left)
right_format = """
$python\
$nodejs\
$rust\
$golang\
$java"""

add_newline = true
command_timeout = 200

# =============================================================================
# Directory
# =============================================================================
[directory]
style           = "bold #7aa2f7"
read_only       = " 󰌾"
read_only_style = "#f7768e"
# Outside a git repo: long paths. Inside a git repo: repo folder + path under root (e.g. config/alacritty; branch from custom.githead).
truncation_length = 100
truncate_to_repo  = true
truncation_symbol = "…/"
# Starship: $repo_root + $path = path from repo root (no …/Misc/config prefix). Omarchy used basename-only; we keep subdirs visible.
repo_root_style = "bold #7aa2f7"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
format = "[$path]($style)[$read_only]($read_only_style) "

# =============================================================================
# Git (custom ref: branch / exact tag / HEAD; status icons without counts)
# =============================================================================
[git_branch]
disabled = true

[custom.githead]
description = "git branch, exact tag, or HEAD"
command = "git symbolic-ref -q --short HEAD 2>/dev/null || git describe --tags --exact-match 2>/dev/null || echo HEAD"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
symbol = " "
style = "#bb9af7"
format = "[$symbol$output]($style) "

[git_status]
style     = "#f7768e"
# Icons only — ${count} was how many files in that state (e.g. 7 modified, 16 untracked).
format    = "[$all_status$ahead_behind]($style) "
conflicted  = "= "
ahead       = "⇡ "
behind      = "⇣ "
diverged    = "⇕ "
untracked   = ""
stashed     = "󰏗 "
modified    = " "
staged      = "+ "
renamed     = "» "
deleted     = "✘ "
up_to_date  = ""

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "#e0af68"

# =============================================================================
# Prompt character
# =============================================================================
[character]
# Omarchy-style: chevron when last status was 0, ✗ when non-zero (e.g. Ctrl+C → 130).
success_symbol = "[❯](#9ece6a)"
error_symbol   = "[✗](#f7768e)"
vimcmd_symbol  = "[❮](#bb9af7)"

# =============================================================================
# Command duration — only show if > 2s
# =============================================================================
[cmd_duration]
min_time    = 2000
format      = "[ $duration]($style) "
style       = "#e0af68"
show_notifications = false

# =============================================================================
# Languages — right prompt, only shown when relevant
# =============================================================================
[python]
symbol = " "
style  = "#7dcfff"
format = "[$symbol$version]($style) "
detect_files      = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]
detect_extensions = ["py"]

[nodejs]
symbol = " "
style  = "#9ece6a"
format = "[$symbol$version]($style) "

[rust]
symbol = "󱘗 "
style  = "#ff9e64"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style  = "#7dcfff"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style  = "#f7768e"
format = "[$symbol$version]($style) "

# =============================================================================
# Time — off (no clock in the right prompt)
# =============================================================================
[time]
disabled = true

# =============================================================================
# Disabled modules (keep prompt clean)
# =============================================================================
[package]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
