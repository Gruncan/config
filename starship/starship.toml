# =============================================================================
# Starship â€” Tokyo Night Dark prompt
# Deploy: cp starship/starship.toml ~/.config/starship.toml
# Note: starship also ships a built-in preset you can preview first:
#   starship preset tokyo-night -o /tmp/starship-preview.toml
# =============================================================================

# Format â€” single line, clean left prompt
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$cmd_duration\
$line_break\
$character"""

# Right prompt (optional â€” shows context without cluttering the left)
right_format = """
$python\
$nodejs\
$rust\
$golang\
$java\
$time"""

add_newline = true

# =============================================================================
# Directory
# =============================================================================
[directory]
style           = "bold #7aa2f7"
read_only       = " َ°Œ¾"
read_only_style = "#f7768e"
truncation_length = 3
truncate_to_repo  = true

[directory.substitutions]
"~/Development" = "َ°²‹ dev"

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = " "
style  = "#bb9af7"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "#f7768e"
format    = "([$all_status$ahead_behind]($style) )"
conflicted  = "="
ahead       = "â‡،${count}"
behind      = "â‡£${count}"
diverged    = "â‡•â‡،${ahead_count}â‡£${behind_count}"
untracked   = "?${count}"
stashed     = "َ°ڈ— "
modified    = "!${count}"
staged      = "+${count}"
renamed     = "آ»${count}"
deleted     = "âœک${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "#e0af68"

# =============================================================================
# Prompt character
# =============================================================================
[character]
success_symbol = "[â‌¯](#9ece6a)"
error_symbol   = "[â‌¯](#f7768e)"
vimcmd_symbol  = "[â‌®](#bb9af7)"

# =============================================================================
# Command duration â€” only show if > 2s
# =============================================================================
[cmd_duration]
min_time    = 2000
format      = "[ $duration]($style) "
style       = "#e0af68"
show_notifications = false

# =============================================================================
# Languages â€” right prompt, only shown when relevant
# =============================================================================
[python]
symbol = " "
style  = "#7dcfff"
format = "[$symbol$version]($style) "
detect_files      = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]
detect_extensions = ["py"]

[nodejs]
symbol = " "
style  = "#9ece6a"
format = "[$symbol$version]($style) "

[rust]
symbol = "َ±ک— "
style  = "#ff9e64"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style  = "#7dcfff"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style  = "#f7768e"
format = "[$symbol$version]($style) "

# =============================================================================
# Time (right prompt)
# =============================================================================
[time]
disabled  = false
format    = "[$time]($style)"
style     = "#565f89"
time_format = "%H:%M"

# =============================================================================
# Disabled modules (keep prompt clean)
# =============================================================================
[package]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
