# XDG Desktop Portal backend preferences for Hyprland on Kubuntu 24.04
#
# On Kubuntu, xdg-desktop-portal-kde is installed as a KDE dependency.
# This file tells the portal daemon to prefer wlr (or hyprland if built from
# source) over kde when the session desktop is Hyprland, so screensharing and
# file pickers work correctly.
#
# Deploy: mkdir -p ~/.config/xdg-desktop-portal
#         cp xdg-portal/hyprland-portals.conf \
#            ~/.config/xdg-desktop-portal/hyprland-portals.conf
# (The portal reads this file because the filename matches XDG_CURRENT_DESKTOP.)

[preferred]
default=hyprland;wlr
org.freedesktop.impl.portal.Secret=gnome-keyring
