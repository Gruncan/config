# xsettingsd — broadcasts GTK theme settings to running apps in i3
# Without a DE running, GTK apps won't pick up ~/.config/gtk-3.0/settings.ini
# on their own. xsettingsd fills that role.
# Deploy: mkdir -p ~/.config/xsettingsd && cp xsettingsd/xsettingsd.conf ~/.config/xsettingsd/xsettingsd.conf
# Started by i3 — see i3/config exec line

Net/ThemeName        "Tokyonight-Dark-B"
Net/IconThemeName    "Papirus-Dark"
Gtk/CursorThemeName  "capitaine-cursors"
Gtk/CursorThemeSize  24
Gtk/FontName         "JetBrains Mono 10"
Xft/Antialias        1
Xft/Hinting          1
Xft/HintStyle        "hintslight"
Xft/RGBA             "rgb"
