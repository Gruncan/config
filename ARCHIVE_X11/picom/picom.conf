# =============================================================================
# picom — compositor config for i3 / Tokyo Night
# Deploy: mkdir -p ~/.config/picom && cp picom/picom.conf ~/.config/picom/picom.conf
# Started by i3 config via: exec --no-startup-id picom --backend glx -b
# =============================================================================

# -----------------------------------------------------------------------------
# Backend
# glx is faster on most hardware; use xrender if you hit glx driver issues
# -----------------------------------------------------------------------------
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# VSync — prevents screen tearing; try "none" if you experience stuttering
vsync = true;

# -----------------------------------------------------------------------------
# Shadows
# -----------------------------------------------------------------------------
shadow = true;
shadow-radius = 12;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.5;

# Don't draw shadows on these window classes
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'Dunst'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'slop'",
];

# -----------------------------------------------------------------------------
# Fading — smooth window open/close
# -----------------------------------------------------------------------------
fading = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 5;

fade-exclude = [];

# -----------------------------------------------------------------------------
# Opacity — keep windows fully opaque unless you want transparency
# Alacritty handles its own opacity; this controls everything else
# -----------------------------------------------------------------------------
inactive-opacity = 0.95;
active-opacity   = 1.0;
frame-opacity    = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    # Verify Zen's class with: xprop WM_CLASS on a Zen window, then update below
    "100:class_g = 'zen'",
    "100:class_g = 'zen-alpha'",
    "100:class_g = 'Chromium'",
    "100:class_g = 'vlc'",
    "100:class_g = 'mpv'",
    "100:class_g = 'Gimp'",
    "100:class_g = 'jetbrains-clion'",
    "96:class_g  = 'Alacritty'",
];

# -----------------------------------------------------------------------------
# Rounded corners (requires picom >= 8.0 / yshui fork)
# -----------------------------------------------------------------------------
corner-radius = 6;

rounded-corners-exclude = [
    "class_g = 'i3bar'",
    "class_g = 'i3-frame'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

# -----------------------------------------------------------------------------
# Window type rules
# -----------------------------------------------------------------------------
wintypes:
{
    tooltip       = { fade = true; shadow = false; opacity = 0.9; focus = true; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 1.0; };
    dropdown_menu = { opacity = 1.0; };
    notification  = { shadow = false; };
};

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------
# Avoid repainting windows that aren't visible
use-damage = true;

# Don't track changes in override-redirect windows (speeds things up)
unredir-if-possible = false;

# Log level: "warn" in production, "debug" if troubleshooting
log-level = "warn";
