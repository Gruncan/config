# =============================================================================
# Hyprland Config — Omarchy-inspired · Tokyo Night Dark
# Target: Kubuntu 24.04 · Wayland
# Deploy: mkdir -p ~/.config/hypr && cp hypr/hyprland.conf ~/.config/hypr/hyprland.conf
# =============================================================================

################
### MONITORS ###
################

# Auto-detect all connected monitors at their preferred resolution/refresh rate.
# Run `hyprctl monitors` after first login to see detected outputs, then replace
# this line with explicit monitor rules if you need custom resolutions or ordering.
monitor=,preferred,auto,1

###################
### ENVIRONMENT ###
###################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,capitaine-cursors
env = GTK_THEME,Tokyonight-Dark-B
env = QT_QPA_PLATFORM,wayland
env = QT_STYLE_OVERRIDE,kvantum
env = QT6_STYLE_OVERRIDE,kvantum
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

# Nvidia GPU — uncomment these four lines if you have an Nvidia card:
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
# env = GBM_BACKEND,nvidia-drm

###############
### AUTOSTART##
###############

exec-once = waybar
exec-once = dunst
# Polkit agent — required for GUI password dialogs (nm-applet, package managers).
# policykit-1-gnome provides /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1
exec-once = /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1
# Network manager system tray icon (connect to WiFi, VPN, etc.)
exec-once = nm-applet --indicator
# Solid Tokyo Night background until you add a wallpaper (Step 9).
# After adding ~/Pictures/wallpaper.jpg, change this line to:
#   exec-once = swaybg -i ~/Pictures/wallpaper.jpg -m fill
exec-once = swaybg -c 1a1b26

# Tell D-Bus about the Wayland session so portals can activate correctly.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Restart portals after the environment is set (they may have started before Hyprland was ready).
exec-once = systemctl --user restart xdg-desktop-portal xdg-desktop-portal-wlr

# Apply GTK/cursor theme on every login
exec-once = gsettings set org.gnome.desktop.interface gtk-theme        'Tokyonight-Dark-B'
exec-once = gsettings set org.gnome.desktop.interface icon-theme       'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme     'capitaine-cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size      24
exec-once = gsettings set org.gnome.desktop.interface font-name        'JetBrains Mono 10'
exec-once = gsettings set org.gnome.desktop.interface color-scheme     'prefer-dark'

###########
### INPUT ##
###########

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.8
    }
}

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    # Tokyo Night blue → purple gradient on focused window
    col.active_border   = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(292e42ff)

    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 3
        ignore_opacity = false
    }

    shadow {
        enabled = true
        range = 14
        render_power = 2
        color = rgba(1a1b26cc)
        color_inactive = rgba(1a1b2655)
    }

    # Slight fade for inactive windows
    inactive_opacity = 0.95
    active_opacity   = 1.0
}

animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.35, 1
    bezier = overshot,       0.05, 0.9,  0.1,  1.1

    animation = windows,     1, 5, overshot
    animation = windowsOut,  1, 4, easeOutQuint, popin 80%
    animation = border,      1, 8, default
    animation = borderangle, 1, 8, default
    animation = fade,        1, 5, default
    animation = workspaces,  1, 5, easeInOutCubic, slide
}

dwindle {
    pseudotile    = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}

#####################
### WINDOW RULES  ###
#####################

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(kvantummanager)$
windowrulev2 = float, class:^(zenity)$
windowrulev2 = float, title:^(File Operation Progress)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$

# Remove gaps/border for true fullscreen
windowrulev2 = noborder, fullscreen:1

####################
### KEYBINDINGS  ###
####################

$mod      = SUPER
$terminal = alacritty
$launcher = wofi --show drun

# Core
bind = $mod,       Return,      exec,          $terminal
bind = $mod,       Space,       exec,          $launcher
bind = $mod SHIFT, Q,           killactive
bind = $mod SHIFT, E,           exit
bind = $mod,       F,           fullscreen,    0
bind = $mod,       M,           fullscreen,    1  # monocle (max without gaps)
bind = $mod SHIFT, Space,       togglefloating
bind = $mod,       P,           pseudo            # dwindle pseudotile
bind = $mod,       T,           togglesplit        # dwindle split direction

# Focus (vim keys)
bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, k,     movefocus, u
bind = $mod, j,     movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows (vim keys)
bind = $mod SHIFT, h,     movewindow, l
bind = $mod SHIFT, l,     movewindow, r
bind = $mod SHIFT, k,     movewindow, u
bind = $mod SHIFT, j,     movewindow, d
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize mode (Super+R, then hjkl/arrows, Escape to exit)
bind = $mod, R, submap, resize
submap = resize
binde = , h,     resizeactive, -30  0
binde = , l,     resizeactive,  30  0
binde = , k,     resizeactive,  0 -30
binde = , j,     resizeactive,  0  30
binde = , left,  resizeactive, -30  0
binde = , right, resizeactive,  30  0
binde = , up,    resizeactive,  0 -30
binde = , down,  resizeactive,  0  30
bind  = , escape, submap, reset
submap = reset

# Workspaces 1-9 and 10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces on Waybar / mouse wheel over desktop
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Lock screen
bind = $mod, L, exec, swaylock

# Screenshots
bind = , Print,       exec, mkdir -p ~/Pictures && grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mod SHIFT, S, exec, mkdir -p ~/Pictures && grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Brightness (requires brightnessctl)
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Volume & media keys
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute,        exec, pactl set-sink-mute   @DEFAULT_SINK@ toggle
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous
