# =============================================================================
# Alacritty — Tokyo Night Dark
# Deploy: mkdir -p ~/.config/alacritty && cp alacritty/alacritty.toml ~/.config/alacritty/
# =============================================================================

# Note: alacritty >= 0.12 uses TOML. If you have an older version from apt
# that still uses YAML, run: alacritty --version to check, and use the
# alacritty.yml file instead (see comments at bottom).

[window]
padding        = { x = 12, y = 10 }
decorations    = "full"
opacity        = 0.96
blur           = false
title          = "Alacritty"
dynamic_title  = true
startup_mode   = "Windowed"

[scrolling]
history    = 10000
multiplier = 3

[font]
normal      = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold        = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic      = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size        = 12.0

# Fallback if Nerd Font isn't installed yet
# normal = { family = "JetBrains Mono", style = "Regular" }

[cursor]
style        = { shape = "Block", blinking = "On" }
blink_interval = 750
unfocused_hollow = true

# -----------------------------------------------------------------------------
# Tokyo Night Dark colors
# -----------------------------------------------------------------------------
[colors]
draw_bold_text_with_bright_colors = false

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"
dim_foreground = "#a9b1d6"

[colors.cursor]
text   = "#1a1b26"
cursor = "#c0caf5"

[colors.vi_mode_cursor]
text   = "#1a1b26"
cursor = "#bb9af7"

[colors.search.matches]
foreground = "#1a1b26"
background = "#7aa2f7"

[colors.search.focused_match]
foreground = "#1a1b26"
background = "#ff9e64"

[colors.footer_bar]
foreground = "#1a1b26"
background = "#c0caf5"

[colors.hints.start]
foreground = "#1a1b26"
background = "#e0af68"

[colors.hints.end]
foreground = "#1a1b26"
background = "#7aa2f7"

[colors.selection]
text       = "CellForeground"
background = "#283457"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.dim]
black   = "#0d0e15"
red     = "#914c54"
green   = "#5a7a29"
yellow  = "#726a3d"
blue    = "#3954a5"
magenta = "#5c4a78"
cyan    = "#4d94a0"
white   = "#717c7c"

# -----------------------------------------------------------------------------
# Keyboard — useful extras
# -----------------------------------------------------------------------------
[keyboard]
bindings = [
    # Ctrl+Shift+C/V for copy/paste (matches most terminal conventions)
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "V", mods = "Control|Shift", action = "Paste" },
    # Ctrl+Shift+N opens a new window
    { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
    # Increase/decrease font size
    { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Control", action = "ResetFontSize" },
]

# -----------------------------------------------------------------------------
# Mouse
# -----------------------------------------------------------------------------
[mouse]
hide_when_typing = true
