# GTK 4 settings — Tokyo Night Dark
# Deploy: mkdir -p ~/.config/gtk-4.0 && cp gtk/gtk4-settings.ini ~/.config/gtk-4.0/settings.ini
# Note: GTK4 apps largely ignore this file in favour of libadwaita — see SETUP.md Step 9

[Settings]
gtk-theme-name          = Tokyonight-Dark-B
gtk-icon-theme-name     = Papirus-Dark
gtk-cursor-theme-name   = capitaine-cursors
gtk-cursor-theme-size   = 24
gtk-font-name           = JetBrains Mono 10

gtk-xft-antialias = 1
gtk-xft-hinting   = 1
gtk-xft-hintstyle = hintslight
gtk-xft-rgba      = rgb
