# =============================================================================
# i3status config — Tokyo Night Dark
# Deploy: cp i3/i3status.conf ~/.config/i3/i3status.conf
# =============================================================================

general {
    colors      = true
    interval    = 5
    color_good      = "#9ece6a"
    color_degraded  = "#e0af68"
    color_bad       = "#f7768e"
    color_separator = "#565f89"
    separator   = " "
}

# Adjust the order to match your hardware.
# Comment out sections that don't apply (e.g. battery on a desktop).
order += "disk /"
order += "cpu_usage"
order += "memory"
order += "ethernet _first_"
order += "wireless _first_"
order += "battery all"
order += "volume master"
order += "tztime local"

# ---- Storage ----------------------------------------------------------------
disk "/" {
    format   = "  %avail"
    low_threshold = 10
    threshold_type = percentage_avail
}

# ---- CPU --------------------------------------------------------------------
cpu_usage {
    format = " %usage"
    max_threshold = 90
    degraded_threshold = 70
}

# ---- Memory -----------------------------------------------------------------
memory {
    format           = "  %used / %total"
    threshold_degraded = "2G"
    format_degraded  = "  MEM LOW: %available"
}

# ---- Network — wired --------------------------------------------------------
ethernet _first_ {
    format_up   = "  %ip"
    format_down = ""
}

# ---- Network — wireless -----------------------------------------------------
wireless _first_ {
    format_up   = "  %essid %quality"
    format_down = "  offline"
}

# ---- Battery (comment out if desktop) ---------------------------------------
battery all {
    format           = "%status %percentage %remaining"
    format_down      = ""
    status_chr       = " CHR"
    status_bat       = " BAT"
    status_unk       = "?"
    status_full      = " FULL"
    path             = "/sys/class/power_supply/BAT%d/uevent"
    low_threshold    = 15
    integer_battery_capacity = true
    last_full_capacity = true
}

# ---- Volume (ALSA/PulseAudio) -----------------------------------------------
volume master {
    format       = "  %volume"
    format_muted = "  muted"
    device       = "default"
    mixer        = "Master"
    mixer_idx    = 0
}

# ---- Clock ------------------------------------------------------------------
tztime local {
    format = "  %a %d %b  %H:%M"
}
